<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>సన్నివేశం — జతపరుచు</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    .game-container {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: 20px auto;
      display: flex;
      justify-content: space-between;
      padding: 0 10px;
      box-sizing: border-box;
    }
    .column {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 42%;
      z-index: 10;
    }
    .dot-node {
      background: rgba(237, 227, 200, 0.05);
      border: 1px solid rgba(237, 227, 200, 0.2);
      padding: 15px 10px;
      border-radius: 8px;
      color: #EDE3C8;
      text-align: center;
      font-size: 1.15rem;
      font-weight: bold;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }
    .dot-node:hover {
      border-color: #C9A24B;
      background: rgba(201, 162, 75, 0.08);
    }
    .dot-node.active {
      border-color: #4CB5C9 !important;
      background: rgba(76, 181, 201, 0.15) !important;
    }
    .dot-node.matched {
      border-color: #C9A24B !important;
      background: rgba(201, 162, 75, 0.15) !important;
      color: #C9A24B !important;
      cursor: default;
    }
    svg#svgLines {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    line {
      stroke: #C9A24B;
      stroke-width: 3;
      stroke-linecap: round;
      opacity: 0.85;
    }
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 12, 8, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .overlay.hidden { display: none !important; }
    .overlay-content {
      text-align: center;
      background: rgba(25, 20, 15, 0.9);
      padding: 30px;
      border: 1px solid #C9A24B;
      border-radius: 12px;
      width: 80%; max-width: 400px;
    }
    .gold-btn {
      background: transparent;
      border: 1px solid #C9A24B;
      color: #C9A24B;
      padding: 10px 24px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 20px;
      border-radius: 4px;
    }
    .gold-btn:hover { background: #C9A24B; color: #110c08; }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="sannivesham-hero" style="margin-bottom: 15px;">
      <h1 class="main-brand-title" style="font-size: 2.2rem;">సన్నివేశం</h1>
    </div>

    <header class="site-header" style="text-align: center; margin-bottom: 25px;">
      <h2 id="levelTitle" style="font-size: 1.6rem; color: #EDE3C8;">లెవెల్</h2>
      <p id="levelSubtitle" style="color: #C9A24B; font-size: 1rem; margin-top: 4px;"></p>
      <div style="margin-top: 10px;">
        <a href="index.html" style="color: #4CB5C9; text-decoration: none; font-size: 0.95rem;">← అన్ని లెవెల్స్</a>
      </div>
    </header>

    <div class="game-container" id="gameContainer">
      <svg id="svgLines"></svg>
      <div class="column" id="leftColumn"></div>
      <div class="column" id="rightColumn"></div>
    </div>
  </div>

  <div id="winOverlay" class="overlay hidden">
    <div class="overlay-content">
      <h2 style="color: #C9A24B; font-family: 'Cinzel', serif; margin-bottom: 10px;">అద్భుతం!</h2>
      <p style="color: #EDE3C8;">అన్ని జతలు విజయవంతంగా కలపబడ్డాయి.</p>
      <button id="nextLevelBtn" class="gold-btn">తదుపరి లెవెల్ →</button>
    </div>
  </div>

  <script src="dots-data.js"></script>
  <script type="module" src="progress.js"></script>
  <script src="game.js"></script>
</body>
</html>
