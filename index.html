<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>సన్నివేశం — జతపరుచు (Match the Dots)</title>
  <style>
    /* Premium Branded Dark Theme Variables */
    :root {
      --bg-dark: #120c08;
      --card-bg: rgba(237, 227, 200, 0.05);
      --gold: #C9A24B;
      --gold-dim: rgba(201, 162, 75, 0.3);
      --parchment: #EDE3C8;
      --cyan: #4CB5C9;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--parchment);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
    }

    /* Branded Hero Header Styling */
    .sannivesham-hero {
      text-align: center;
      padding: 30px 10px;
      margin-bottom: 20px;
    }
    .hero-logo-wrapper {
      display: inline-block;
      margin-bottom: 15px;
    }
    .hero-emblem {
      width: 90px;
      height: 90px;
      background: rgba(201, 162, 75, 0.1);
      border: 1px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(201, 162, 75, 0.2);
    }
    .emblem-img {
      width: 75px;
      height: 75px;
      object-fit: contain;
    }
    .main-brand-title {
      font-size: 2.5rem;
      margin: 5px 0;
      color: var(--parchment);
      font-weight: bold;
      letter-spacing: 1px;
    }
    .main-brand-tagline {
      font-size: 1rem;
      color: var(--gold);
      margin: 5px 0 0 0;
      opacity: 0.85;
      letter-spacing: 2px;
    }

    /* Header Controls */
    .site-header {
      border-bottom: 1px solid rgba(201, 162, 75, 0.2);
      padding-bottom: 20px;
      margin-bottom: 30px;
      text-align: left;
    }
    .site-header h2 {
      margin: 0 0 6px 0;
      font-size: 1.8rem;
      color: var(--parchment);
    }
    .site-header .subtitle {
      margin: 0;
      color: rgba(237, 227, 200, 0.7);
      font-size: 1rem;
    }

    /* 12-Level Dashboard Grid System */
    .level-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .level-card {
      background: var(--card-bg);
      border: 1px solid var(--gold-dim);
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: var(--parchment);
      position: relative;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
      min-height: 140px;
    }

    .level-card:not(.locked):hover {
      transform: translateY(-4px);
      border-color: var(--gold);
      box-shadow: 0 6px 20px rgba(201, 162, 75, 0.15);
      cursor: pointer;
    }

    .level-card.locked {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .level-number {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .level-title {
      font-size: 1.35rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }

    .level-subtitle {
      font-size: 0.95rem;
      color: var(--gold);
      opacity: 0.85;
      margin-bottom: 16px;
    }

    .level-meta {
      font-size: 0.85rem;
      color: rgba(237, 227, 200, 0.6);
      margin-top: auto;
    }

    .level-lock-icon {
      font-size: 1.2rem;
    }

    /* Responsive Adjustments */
    @media (max-width: 768px) {
      .site-header {
        text-align: center;
        padding-bottom: 45px;
      }
      .main-brand-title {
        font-size: 2rem;
      }
      .level-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <!-- Cinematic Branded Hero Section -->
    <div class="sannivesham-hero">
      <div class="hero-logo-wrapper">
        <div class="hero-emblem">
          <img src="https://sannivesham.com/images/logo.png" alt="Sannivesham Logo" class="emblem-img">
        </div>
      </div>
      <h1 class="main-brand-title">సన్నివేశం</h1>
      <p class="main-brand-tagline">సంస్కృతి • సంప్రదాయం • సంభాషణ</p>
    </div>

    <!-- Game Section Header -->
    <header class="site-header" style="position: relative;">
      <div>
        <h2>జతపరుచు (Connect the Dots)</h2>
        <p class="subtitle">పాత్రలను వాటి విశేష ఆయుధాలు మరియు గుర్తింపులతో జతపరచండి.</p>
      </div>
      <a href="https://sannivesham.com" style="position: absolute; right: 0; bottom: 20px; color: var(--cyan); text-decoration: none; font-size: 0.95rem;">← Back to main site</a>
    </header>

    <!-- Dynamic Level Selection Grid -->
    <div id="levelGrid" class="level-grid"></div>
  </div>

  <script src="dots-data.js"></script>
  <script type="module" src="progress.js"></script>
  <script src="level-select.js"></script>
</body>
</html>
